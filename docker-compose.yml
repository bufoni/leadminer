# LeadMiner - Docker Compose para Produção
# Use com Dokploy ou qualquer orquestrador Docker

version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: leadminer-mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=leadminer
    networks:
      - leadminer-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leadminer-backend
    restart: always
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017/leadminer
      - DB_NAME=${DB_NAME:-leadminer}
      - JWT_SECRET=${JWT_SECRET}
      - STRIPE_API_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDER_EMAIL=${SENDER_EMAIL:-noreply@leadminer.com.br}
      - SCRAPER_SERVICE_URL=http://scraper:8002
      - FACEBOOK_APP_ID=${FACEBOOK_APP_ID}
      - FACEBOOK_APP_SECRET=${FACEBOOK_APP_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - leadminer-network
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.leadminer-api.rule=Host(`api.leadminer.localhost`)"
      - "traefik.http.services.leadminer-api.loadbalancer.server.port=8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Scraper Service (FastAPI + Playwright)
  scraper:
    build:
      context: ./scraper-service
      dockerfile: Dockerfile
    container_name: leadminer-scraper
    restart: always
    environment:
      - SCRAPER_PORT=8002
    networks:
      - leadminer-network
    # Scraper needs more resources for Playwright
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=${BACKEND_URL:-}
    container_name: leadminer-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - leadminer-network
      - proxy

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.leadminer-frontend.rule=Host(`leadminer.localhost`)"
      - "traefik.http.routers.leadminer-frontend.entrypoints=web"
      - "traefik.http.routers.leadminer-frontend.service=leadminer-frontend-svc"
      - "traefik.http.services.leadminer-frontend-svc.loadbalancer.server.port=80"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  leadminer-network:
    driver: bridge

  proxy:
    external: true

volumes:
  mongodb_data:
    driver: local
